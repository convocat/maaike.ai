# yaml-language-server: $schema=https://sveltiacms.app/schema/config.v2.json

backend:
  name: github
  repo: convocat/maaike.ai
  branch: main

media_folder: public/images
public_folder: /images
omit_empty_optional_fields: true

media_libraries:
  stock_assets:
    providers:
      - unsplash
      - pexels

collections:
  - name: settings
    label: Site Settings
    icon: settings
    files:
      - name: general
        label: General
        file: src/data/settings.json
        fields:
          - { name: siteTitle, label: Site Title, widget: string }
          - { name: siteTagline, label: Tagline, widget: string }
          - { name: logo, label: Logo, widget: image, required: false }
          - { name: articlesTitle, label: Articles Page Title, widget: string }
          - { name: articlesDescription, label: Articles Description, widget: string }
          - { name: fieldNotesTitle, label: Field Notes Page Title, widget: string }
          - { name: fieldNotesDescription, label: Field Notes Description, widget: string }
          - { name: sparksTitle, label: Sparks Page Title, widget: string }
          - { name: sparksDescription, label: Sparks Description, widget: string }
          - { name: weblinksTitle, label: Weblinks Page Title, widget: string }
          - { name: weblinksDescription, label: Weblinks Description, widget: string }
          - { name: videosTitle, label: Videos Page Title, widget: string }
          - { name: videosDescription, label: Videos Description, widget: string }
          - { name: libraryTitle, label: Library Page Title, widget: string }
          - { name: libraryDescription, label: Library Description, widget: string }
          - { name: principlesTitle, label: Principles Page Title, widget: string }
          - { name: principlesDescription, label: Principles Description, widget: string }

  - name: tags
    label: Tags
    icon: sell
    folder: src/content/tags
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Tag Name, widget: string }

  - name: articles
    label: Articles
    icon: article
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - { name: pruning, label: "🌿 Pruning", widget: text, required: false, hint: "A reflection on this older piece — what would you add, change, or prune?" }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: field-notes
    label: Field Notes
    icon: description
    folder: src/content/field-notes
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: sparks
    label: Sparks
    icon: electric_bolt
    folder: src/content/sparks
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: weblinks
    label: Weblinks
    icon: link
    folder: src/content/weblinks
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: url, label: URL, widget: string, type: url }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: videos
    label: Videos
    icon: videocam
    folder: src/content/videos
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: url, label: YouTube URL, widget: string, type: url }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: library
    label: Library
    icon: menu_book
    folder: src/content/library
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{author}} — {{status}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: author, label: Author, widget: string }
      - { name: cover, label: Cover Image, widget: image, required: false }
      - { name: status, label: Reading Status, widget: select, options: [reading, read, to-read], default: to-read }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: principles
    label: Design Principles
    icon: lightbulb
    folder: src/content/principles
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }
