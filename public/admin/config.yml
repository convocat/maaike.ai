backend:
  name: github
  repo: convocat/maaike.ai
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: articles
    label: Articles
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        options: [ai, communication, crm, digital-gardens, evaluation, human-behavior, llm, patterns, prompting, systems-thinking, web-history, writing]
        default: []
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: notes
    label: Notes
    folder: src/content/notes
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        options: [ai, communication, crm, digital-gardens, evaluation, human-behavior, llm, patterns, prompting, systems-thinking, web-history, writing]
        default: []
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: links
    label: Links
    folder: src/content/links
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: url, label: URL, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        options: [ai, communication, crm, digital-gardens, evaluation, human-behavior, llm, patterns, prompting, systems-thinking, web-history, writing]
        default: []
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }
