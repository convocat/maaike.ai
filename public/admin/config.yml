# yaml-language-server: $schema=https://sveltiacms.app/schema/config.v2.json

backend:
  name: github
  repo: convocat/maaike.ai
  branch: main

media_folder: public/images
public_folder: /images
omit_empty_optional_fields: true

media_libraries:
  stock_assets:
    providers:
      - unsplash
      - pexels

collections:
  - name: tags
    label: Tags
    icon: sell
    folder: src/content/tags
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: Tag Name, widget: string }

  - name: articles
    label: Articles
    icon: article
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: notes
    label: Notes
    icon: edit_note
    folder: src/content/notes
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }

  - name: links
    label: Links
    icon: link
    folder: src/content/links
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{maturity}}"
    fields:
      - { name: title, label: Title, widget: string }
      - { name: url, label: URL, widget: string, type: url }
      - { name: date, label: Date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { name: updated, label: Last Updated, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { name: maturity, label: Maturity, widget: select, options: [draft, developing, solid, complete], default: draft }
      - name: tags
        label: Tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: "{{slug}}"
        display_fields: [title]
        multiple: true
        required: false
      - { name: description, label: Description, widget: string, required: false }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }
