name: Telegram sync

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Telegram sync
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python scripts/telegram_sync.py

      - name: Commit changes
        run: |
          git config user.name "Maaike"
          git config user.email "maaikevanconvocat@gmail.com"
          git add src/content/weblinks/
          [ -f src/content/_inbox/telegram.md ] && git add src/content/_inbox/telegram.md || true
          if ! git diff --staged --quiet; then
            git commit -m "Telegram sync: $(date +'%Y-%m-%d')"
            git push
          fi
