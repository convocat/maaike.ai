name: Share Link
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to share'
        required: true
      title:
        description: 'Title (optional — auto-fetched from page if empty)'
        required: false
        default: ''
      tags:
        description: 'Tags (comma-separated)'
        required: false
        default: ''

jobs:
  create-link:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create link post
        run: |
          URL="${{ github.event.inputs.url }}"
          TITLE="${{ github.event.inputs.title }}"

          # Auto-fetch title from URL if not provided
          if [ -z "$TITLE" ]; then
            PAGE=$(curl -sL -A "Mozilla/5.0" "$URL")
            # Try og:title first (works better for LinkedIn, Twitter, etc.)
            TITLE=$(echo "$PAGE" | grep -oP '(?<=og:title"[^"]*content=")[^"]*' | head -1)
            # Fall back to <title> tag
            if [ -z "$TITLE" ]; then
              TITLE=$(echo "$PAGE" | tr '\n' ' ' | grep -oP '(?<=<title[^>]*>)[^<]*' | head -1)
            fi
            # Clean up HTML entities
            TITLE=$(echo "$TITLE" | sed 's/&amp;/\&/g; s/&lt;/</g; s/&gt;/>/g; s/&quot;/"/g; s/&#39;/'"'"'/g')
            # Strip generic suffixes like " | LinkedIn" or " - YouTube"
            TITLE=$(echo "$TITLE" | sed 's/ [|·–-] *LinkedIn$//; s/ [|·–-] *YouTube$//; s/ [|·–-] *X$//; s/ [|·–-] *Twitter$//')
          fi

          # Fallback: use domain name if title still empty
          if [ -z "$TITLE" ]; then
            TITLE=$(echo "$URL" | sed 's|https\?://||; s|/.*||')
          fi

          # Generate slug from title
          SLUG=$(echo "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//')

          DATE=$(date +%Y-%m-%d)
          FILE="src/content/weblinks/${SLUG}.md"

          # Build tags block
          TAGS_INPUT="${{ github.event.inputs.tags }}"
          TAGS_BLOCK=""
          if [ -n "$TAGS_INPUT" ]; then
            IFS=',' read -ra TAG_ARRAY <<< "$TAGS_INPUT"
            for tag in "${TAG_ARRAY[@]}"; do
              TRIMMED=$(echo "$tag" | xargs)
              TAGS_BLOCK="${TAGS_BLOCK}  - ${TRIMMED}"$'\n'
            done
          fi

          # Write the markdown file
          {
            echo "---"
            echo "title: \"$TITLE\""
            echo "date: ${DATE}"
            echo "maturity: draft"
            echo "tags:"
            if [ -n "$TAGS_BLOCK" ]; then
              printf "%s" "$TAGS_BLOCK"
            else
              echo "  []"
            fi
            echo "description: \"\""
            echo "url: \"$URL\""
            echo "---"
            echo ""
          } > "$FILE"

          echo "Created: $FILE"
          cat "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/weblinks/
          git commit -m "Add link: $TITLE"
          git push
