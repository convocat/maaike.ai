name: On article published

# Fires when a PR targeting main is merged and it touched article files.
# Detects newly added articles (not updates) and posts them to LinkedIn.

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'src/content/articles/**'

jobs:
  linkedin-share:
    name: Share new articles to LinkedIn
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find new articles
        id: detect
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"

          # Status A = added (new file), M = modified (update, skip for LinkedIn)
          NEW=$(git diff --name-status "$BASE" "$HEAD" -- src/content/articles/ \
            | grep '^A' | awk '{print $2}')

          if [ -n "$NEW" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            {
              echo 'files<<EOF'
              echo "$NEW"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
            echo "New articles detected:"
            echo "$NEW"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No new articles in this PR — skipping LinkedIn share."
          fi

      - name: Post to LinkedIn
        if: steps.detect.outputs.found == 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_MEMBER_URN: ${{ secrets.LINKEDIN_MEMBER_URN }}
        run: |
          if [ -z "$LINKEDIN_ACCESS_TOKEN" ]; then
            echo "LINKEDIN_ACCESS_TOKEN secret not set — skipping."
            echo "Add it in repo Settings > Secrets > Actions to enable auto-posting."
            exit 0
          fi

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue

            # Skip draft posts
            if grep -q '^draft: true' "$FILE"; then
              echo "Skipping draft: $FILE"
              continue
            fi

            SLUG=$(basename "$FILE" .md)
            URL="https://maaike.ai/articles/${SLUG}"
            OG_IMAGE="public/images/og/articles/${SLUG}.png"

            echo "Posting to LinkedIn: $SLUG"

            # Extract post text (custom linkedin block > title + description)
            node scripts/prepare-linkedin-post.mjs "$FILE" > /tmp/linkedin-post.txt

            # Post — script handles missing OG image gracefully
            node scripts/post-to-linkedin.mjs \
              /tmp/linkedin-post.txt \
              "$OG_IMAGE" \
              "Read the full article: $URL"

          done <<< "${{ steps.detect.outputs.files }}"
