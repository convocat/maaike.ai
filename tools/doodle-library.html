<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doodle Icon Library</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 32px; background: #fafafa; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 32px; }
    .section { margin-bottom: 36px; }
    h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa;
         border-bottom: 1px solid #e8e8e8; padding-bottom: 6px; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 5px;
            padding: 10px 4px; border-radius: 8px; cursor: default; transition: background 0.1s; }
    .cell:hover { background: #f0f0f0; }
    .cell img { width: 40px; height: 40px; display: block; }
    .cell span { font-size: 9px; color: #999; text-align: center; word-break: break-all; line-height: 1.3; }
  </style>
</head>
<body>
  <h1>Doodle Icon Library</h1>
  <p class="subtitle">Stored at <code>public/images/doodle-icons/</code> — hover to inspect, click to copy path.</p>

  <script>
    const BASE = '/images/doodle-icons';
    const categories = {
      arrows: ['arrow-circle-down','arrow-circle-left','arrow-circle-right','arrow-circle-up','arrow-down','arrow-left','arrow-ne','arrow-nw','arrow-right','arrow-se','arrow-single-down','arrow-single-left','arrow-single-right','arrow-single-up','arrow-square-down','arrow-square-left','arrow-square-right','arrow-square-up','arrow-sw','arrow-up','chevrons-down','chevrons-left','chevrons-right','chevrons-up'],
      currency: ['dollar','euro','franc','pound','ruble','rupee','won','yen'],
      'e-commerce': ['bag-2','bag','basket','box-2','box','card-2','card-3','card','cart-add','cart-delete','cart-remove','conveyor-belt','factory','hand-truck','location','offer','qr','sale','shop','shopping-cart-2','shopping-cart-3','shopping-cart','tag-2','tag','truck','unbox','warehouse'],
      emojis: ['confused-emoji','cool-emoji','crying-emoji','grinning-squinting-emoji','happy-emoji','heart-eyes-emoji','laugh-emoji','sad-emoji','shocked-emoji','smiling-emoji','smiling-with-eyes-emoji','surprised-emoji','wink-emoji','worried-emoji'],
      files: ['file-attachment','file-audio','file-code','file-contract','file-csv','file-figma','file-form','file-image-2','file-image','file-invoice','file-jpg','file-list','file-mov','file-mp4','file-notes','file-pdf','file-png','file-spreadsheet','file-svg','file-text','file-vector','file-zip','file','png'],
      finance: ['bank','bill','cash','coin-2','coin','dollar','money-plant','piggy-bank','safe','saving','trend-down-square','trend-down','trend-up-square','trend-up','wallet'],
      food: ['burger','cake','candy','cutlery','dish','drink','egg','fork','ice-cream','pizza-2','pizza','popsicle','spoon','water'],
      health: ['blood-bag','blood','bottle','dropper','first-aid','firstaid-2','flask-round','flask','heart-beat','injection','lungs','medical-logo','microscope','pills','stethoscope','tablet','test-tube','tooth','wheelchair'],
      interface: ['Info','analytics','arrow-down','arrow-up','arrow','at-the-rate','backward','bell-2','bell','bluetooth','bookmark','bulb','calculator','calendar','call','camera','caution','checklist','clock','cloud-down','cloud-up','cloud','cookie','copy','crop','cross','cut','dashboard-2','dashboard-3','dashboard-4','dashboard','delete','diamond','doc-add','doc-remove','doc','download','drawer','eject','eraser','fast-forward','fast-rewind','filter','flag-2','flag','flip','floppy','folder-add','folder-delete','folder-empty','folder-remove','folder','forward','gift','globe','grid-2','grid','headphone','heart','hide','home-1','home','key','layer','left-align-2','left-align','link','list','location-pin','lock','login','logout','magic-wand','mail-gift','mail-open','mail-surprise','mail','map','maximize','megaphone','menu-2','menu','message-2','message','mic-2','mic','minimize','move','music-2','music-3','music','mute','navigation-2','navigation','note','paint-bucket','paper-clip-2','paper-clip','paste','pause','pen-tool','pen','pencil-2','pencil-3','pencil-ruler','pencil','phone-setting','phone','photo','pie','pin','play','puzzle-2','puzzle','question-2','question','record','rectangle','right-align-2','right-align','rss','ruler','scan','search','send-2','send-3','send','server','setting-2','setting-3','setting','shape','shield-2','shield','shuffle','signal','speaker','square','star','stopwatch','suitcase','sun-2','sun-3','sun-4','sun','switch-1','switch','sync','tablet','target-2','target','thumbs-up','tick-2','tick','transform','tree-2','tree','trophy','unhide','unlink','upload','user-add','user-caution','user-delete','user-female','user-male','user-remove','user','video-camera','volume-down','volume-up','zap','zoom-in','zoom-out-1','zoom-out'],
      logos: ['apple','behance','codepen','dribbble','dropbox','facebook-2','facebook','fb-messenger','google','instagram','linkedin','paypal','pinterest','skype','snapchat','spotify','twitter','whatsapp','windows','youtube'],
      misc: ['automation','bot','bug','bus','car','chip','coffee-cup-1','coffee-cup-2','fire','hot-air-balloon','plane','rocket','satellite','server','ship','trophy'],
      objects: ['anchor','balloon-2','balloon','camera','crown','flashlight','frame','guitar','movie-clapper','paint-brush-2','paint-brush','paint-bucket','paint-roller','sofa','tv'],
      weather: ['cloudy-day','cloudy-night','night','rain-heavy','rain-light','snow','snowflake','snowman','sunny','thunderstorm','tornado','wind'],
    };

    for (const [cat, icons] of Object.entries(categories)) {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = `<h2>${cat} (${icons.length})</h2>`;
      const grid = document.createElement('div');
      grid.className = 'grid';
      icons.forEach(name => {
        const path = `${BASE}/${cat}/${name}.svg`;
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.title = `Click to copy path`;
        cell.onclick = () => { navigator.clipboard.writeText(path); cell.style.background = '#d4f0d4'; setTimeout(() => cell.style.background = '', 800); };
        cell.innerHTML = `<img src="${path}" alt="${name}"><span>${name}</span>`;
        grid.appendChild(cell);
      });
      section.appendChild(grid);
      document.body.appendChild(section);
    }
  </script>
</body>
</html>
